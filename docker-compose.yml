# Praxis — dev stack (root: docker-compose.yml)
# Phase 0 needs: postgres, redis, chroma. api/web build once their Dockerfiles exist
# (a Phase 0 task) — until then you can run them locally (uvicorn / npm run dev) and
# only start the infra services: `docker compose up -d postgres redis chroma`.
#
# Judge0 (code sandbox) is intentionally NOT here yet — it is wired in Phase 5.
# See the commented block at the bottom.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis_dev
      POSTGRES_DB: praxis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"            # Chroma serves on 8000 inside; mapped to 8001 on host
    volumes:
      - chromadata:/data
    environment:
      IS_PERSISTENT: "TRUE"

  api:
    build:
      context: ./apps/api      # Dockerfile created in Phase 0
    env_file:
      - ./apps/api/.env
    environment:
      # In dev, point DATABASE_URL at the local postgres above (or at Neon for cloud).
      DATABASE_URL: postgresql+asyncpg://praxis:praxis_dev@postgres:5432/praxis
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    # command: uvicorn praxis.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web      # Dockerfile created in Phase 0
    env_file:
      - ./apps/web/.env
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    # command: npm run dev -- --host

volumes:
  pgdata:
  chromadata:

# ──────────────────────────────────────────────────────────────────────────────
# PHASE 5 — add the code sandbox (Judge0). Judge0 ships its own recommended compose
# (it needs its own db + redis + server + workers). Easiest path: run Judge0 from its
# official compose on a separate port and point the sandbox adapter at it via env
# (JUDGE0_URL). Do NOT inline it here in Phase 0.
# ──────────────────────────────────────────────────────────────────────────────
